<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary SEO -->
    <title>FlowerKnows® Official Site | Luxury Makeup & Beauty Products</title>
    <meta name="description" content="Shop FlowerKnows for premium makeup, lipsticks, and beauty products inspired by fantasy and elegance. Discover high-quality cosmetics with unique packaging.">

    <!-- Robots -->
    <meta name="robots" content="index, follow">

    <!-- Canonical -->
    <link rel="canonical" href="https://flowerknows.co/">

    <!-- Open Graph -->
    <meta property="og:title" content="FlowerKnows | Luxury Makeup & Aesthetic Beauty">
    <meta property="og:description" content="Explore FlowerKnows' unique and artistic makeup collections.">
    <meta property="og:image" content="/src/banner.jpg">
    <meta property="og:url" content="https://flowerknows.co/">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FlowerKnows Beauty | Luxury Makeup">
    <meta name="twitter:description" content="Shop aesthetic and high-quality makeup from FlowerKnows.">
    <meta name="twitter:image" content="/src/banner.jpg">

    <!-- Favicon -->
    <link rel="icon" href="/src/favicon.ico" type="image/x-icon">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Lora&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="nav-bar">
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="hamburger">&#9776;</label>
            <div class="logo">
                <img src="/src/logo.avif" alt="FlowerKnows Logo">
            </div>

            <nav>
                <a href="#home" id="home-link">home</a>
                <a href="#about" id="about-link">about</a>
                <a href="#categories">category</a>
                <a href="#contact">contact</a>
            </nav>

            <div class="right-nav">
                <a><i class="fas fa-search"></i></a>
                <a><i class="fas fa-user"></i></a>
                <a><i class="fas fa-shopping-bag"></i></a>
            </div>
        </div>
    </header>

    <main>
        <section id="home">
            <div class="hero">
                <h1>Welcome to FlowerKnows</h1>
            </div>
            <div></div>

        </section>

        <section id="about" class="section-hidden">
            <h2>About Us</h2>
            <p>Luxury makeup inspired by fantasy and elegance.</p>
        </section>

        <section id="categories" class="section-hidden">
            <div class="category-bar">
                <button id="cat-all" class="active btn category-button">All</button>
                <button id="cat-face" class="btn category-button">Face</button>
                <button id="cat-eyes" class="btn category-button">Eyes</button>
                <button id="cat-lips" class="btn category-button">Lips</button>
                <button id="cat-accessories" class="btn category-button">Accessories & Applicators</button>
            </div>
            <h2 id="category-title" class="text-center">All</h2>
            <div id="product-list" class="grid grid-4"></div>
        </section>
        
        <section id="contact" class="section-hidden">

        </section>
    
    </main>

    <footer>

    </footer>

<script type="module" src="script.js"></script>

</body>
</html>
