<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary SEO -->
    <title>FlowerKnows® Official Site | Luxury Makeup & Beauty Products</title>
    <meta name="description"
        content="Shop FlowerKnows for premium makeup, lipsticks, and beauty products inspired by fantasy and elegance. Discover high-quality cosmetics with unique packaging.">

    <!-- Favicon -->
    <link rel="icon" href="src/favicon.ico" type="image/x-icon">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header id="main-header"></header>

    <main>
        <section id="contact">
            <div class="container section-padding">
                <div class="split-layout">

                    <!-- LEFT SIDE -->
                    <div class="left-content">
                        <h1>Contact Us</h1>

                        <p class="body-text">
                            Have questions or need assistance? Reach out to our customer support team for help with any
                            inquiries you may have.
                        </p>

                        <div class="icon-group">

                            <div class="icon-item">
                                <span aria-hidden="true">✉️</span>
                                <span class="icon-label">
                                    <a href="mailto:flowerknows@gmail.com">flowerknows@gmail.com</a>
                                </span>
                            </div>

                            <div class="icon-item">
                                <span aria-hidden="true">☎️</span>
                                <span class="icon-label">
                                    <a href="tel:+85512345678">+855 12 345 678</a>
                                </span>
                            </div>

                            <div class="icon-item">
                                <span aria-hidden="true">📍</span>
                                <span class="icon-label">Hangzhou, China</span>
                            </div>

                        </div>
                    </div>

                    <!-- RIGHT SIDE -->
                    <div class="right-form">
                        <div class="form-box">

                            <h3 class="form-title">Send us a message <i>!</i></h3>
                            <p class="form-subtext">We'll get back to you within 24 hours.</p>

                            <form>
                                <div class="form-fields">

                                    <!-- First + Last Name -->
                                    <div class="field-row">
                                        <label>
                                            <input type="text" class="input" placeholder="First name" required />
                                        </label>

                                        <label>
                                            <input type="text" class="input" placeholder="Last name" required />
                                        </label>
                                    </div>

                                    <!-- Email + Phone -->
                                    <div class="field-row">
                                        <label>
                                            <input type="email" class="input" placeholder="Email" required />
                                        </label>

                                        <label>
                                            <input type="tel" class="input" placeholder="Phone (optional)" />
                                        </label>
                                    </div>

                                    <!-- Message -->
                                    <label>
                                        <textarea class="input textarea" placeholder="Write your message here..."
                                            required></textarea>
                                    </label>

                                </div>

                                <button type="submit" class="btn btn-primary submit-button">
                                    Send Message
                                </button>

                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </section>

    </main>

    <footer id="main-footer" class="footer"></footer>
    <script type="module" src="script.js"></script>

</body>

</html>
